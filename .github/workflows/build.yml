name: Build Debug APK

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Restore debug keystore
        run: |
          mkdir -p ~/.android
          printf '%s' "$DEBUG_KEYSTORE" | base64 -d > ~/.android/debug.keystore
          # Verify the keystore is valid
          keytool -list -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey 2>&1 | tee /dev/stderr | grep -q 'androiddebugkey' || { echo "ERROR: invalid keystore"; exit 1; }
          keytool -list -v -keystore ~/.android/debug.keystore -storepass android 2>&1 | grep 'SHA1:'
          # Debug: show where Gradle will look for the keystore
          echo "HOME=$HOME"
          echo "USER=$(whoami)"
          ls -la ~/.android/debug.keystore
        env:
          DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}

      - name: Inject build info
        run: |
          REV=$(git rev-parse --short HEAD)
          DATE=$(date -u '+%Y-%m-%d %H:%M')
          printf '/// Auto-generated build info.\nconst String buildRevision = '"'"'%s'"'"';\nconst String buildDate = '"'"'%s'"'"';\n' "$REV" "$DATE" > lib/config/build_info.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Update latest-debug release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: Latest Debug APK
          body: |
            Debug APK built from `${{ github.ref_name }}` at `${{ github.sha }}`.
            Download `app-debug.apk` below and install on your phone.
          prerelease: true
          make_latest: false
          files: build/app/outputs/flutter-apk/app-debug.apk
