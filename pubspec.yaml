name: industrial_sketchbook
description: A native Android tablet app for professional industrial designers.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # --- TDD Appendix B: Dependency Manifest ---

  # Local SQLite — stroke log, sync queue, OCR cache, FTS5 search (TDD §2, §3)
  sqflite: ^2.3.0

  # State management across all services and UI (TDD Appendix B)
  flutter_riverpod: ^2.4.9

  # UUID v4 generation for all entity IDs (TDD §3)
  uuid: ^4.2.1

  # On-device handwriting OCR — vector mode, no server needed (TDD §4.2)
  google_mlkit_digital_ink_recognition: ^0.13.0

  # Google Sign-In for Drive sync (Phase 3)
  google_sign_in: ^6.2.1

  # Camera and photo library access for gallery import (TDD §3.5)
  image_picker: ^1.0.5

  # Thumbnail generation (runs in isolate, not UI thread) (TDD Appendix B)
  image: ^4.1.3

  # Resolves app document and cache directories
  path_provider: ^2.1.1

  # Sorted lists and collection equality utilities
  collection: ^1.18.0
  shared_preferences: ^2.5.4

  # HTTP client for Google Drive REST API (Phase 3.2)
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # SQLite FFI for running database tests on desktop (no Android needed)
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true
